document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a name=\"desc\" value=\"{{ form.desc }}\" sc-camel-on-change=\"{{ onFormChange }}\" rows=\"3\" style=\"margin-top:5px;width:100%;border:3px solid #2B2140;border-radius:12px;padding:9px 12px;font-weight:600;resize:vertical;\"><\u002Ftextarea>\n        <\u002Flabel>\n        <div>\n          <div style=\"font-weight:800;font-size:13px;margin-bottom:6px;\">Product photos ({{ formPhotoCount }})<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center;\">\n            <sc-for list=\"{{ formPhotoRows }}\" as=\"fp\" hint-placeholder-count=\"2\">\n              <div style=\"width:64px;height:64px;border:3px solid #2B2140;border-radius:12px;position:relative;overflow:hidden;\">\n                {{ fp.el }}\n                <button aria-label=\"Remove photo\" sc-camel-on-click=\"{{ fp.remove }}\" style=\"position:absolute;top:2px;right:2px;width:20px;height:20px;border:2px solid #2B2140;border-radius:8px;background:#fff;color:#D63E1E;font-weight:900;cursor:pointer;font-size:10px;line-height:1;padding:0;\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <label style=\"background:#00A896;color:#fff;border:3px solid #2B2140;border-radius:12px;padding:9px 16px;font-weight:800;cursor:pointer;box-shadow:2px 2px 0 #2B2140;display:inline-block;\">+ Add photos\n              <input type=\"file\" accept=\"image/*\" multiple=\"{{ true }}\" sc-camel-on-change=\"{{ onPhotoPick }}\" style=\"display:none;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:700;color:#6B5E85;margin-top:5px;\">The first photo is the cover. Customers can view all photos on the product page.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-weight:800;font-size:13px;margin-bottom:6px;\">Tile color (used when there is no photo)<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ colorOptions }}\" as=\"co\" hint-placeholder-count=\"6\">\n              <button aria-label=\"Tile color {{ co.c }}\" sc-camel-on-click=\"{{ co.pick }}\" style=\"width:36px;height:36px;border-radius:12px;cursor:pointer;background:{{ co.c }};border:{{ co.border }};\"><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-top:6px;\">\n          <button sc-camel-on-click=\"{{ saveProduct }}\" style=\"flex:1;background:#FF5C39;color:#fff;border:3px solid #2B2140;border-radius:14px;padding:12px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:3px 3px 0 #2B2140;font-family:'Baloo 2',sans-serif;\">{{ saveProductLabel }}<\u002Fbutton>\n          <sc-if value=\"{{ formIsEdit }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ deleteProduct }}\" style=\"border:3px solid #2B2140;border-radius:14px;background:#fff;color:#D63E1E;font-weight:800;cursor:pointer;padding:12px 16px;\">Delete<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOAST ============ -->\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n  <div role=\"status\" aria-live=\"polite\" style=\"position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;background:#2B2140;color:#fff;border:3px solid #2B2140;border-radius:14px;padding:12px 22px;font-weight:800;box-shadow:4px 4px 0 rgba(43,33,64,0.3);animation:slideup .2s ease;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <footer style=\"border-top:3px solid #2B2140;background:#FFFDF8;padding:16px 20px;text-align:center;font-weight:800;color:#6B5E85;font-size:13px;\">Happy TCG · toys, consoles &amp; trading cards<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;defaultView&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;shop&quot;, &quot;owner&quot;], &quot;default&quot;: &quot;shop&quot;, &quot;tsType&quot;: &quot;'shop' | 'owner'&quot;, &quot;section&quot;: &quot;Behavior&quot; },\n  &quot;lowStockThreshold&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 1, &quot;max&quot;: 50, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Behavior&quot; },\n  &quot;showMargin&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Owner view&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.SB_URL = 'https://vjwbnlkifayxixssxrle.supabase.co';\n    this.SB_KEY = 'sb_publishable_OAK5ERP2u94OT1CVqbnw8A_48GXm27j';\n    let cart = [];\n    try { cart = JSON.parse(localStorage.getItem('happy-tcg-cart-v2')) || []; } catch (e) {}\n    let cached = null;\n    try { cached = JSON.parse(localStorage.getItem('happy-tcg-catalog-v1')); } catch (e) {}\n    this.state = {\n      loading: !cached,\n      view: this.props.defaultView || 'shop',\n      cur: 'LAK',\n      screen: 'browse',\n      tab: 'dash',\n      searchQ: '', activeCat: 'all', shopTags: [],\n      selId: null, galleryIdx: 0, detailQty: 1,\n      modalOpen: false, saving: false,\n      form: this.blankForm(),\n      stockForm: { productId: '', type: 'in', qty: '', note: '' },\n      newCat: '', newTag: '',\n      ownerCatFilter: 'all', ownerUomFilter: 'all', orderFilter: 'all',\n      ownerAuthed: false, loginEmail: '', loginPass: '', loggingIn: false,\n      checkout: { name: '', phone: '', address: '', shipping: '' }, placing: false,\n      toast: '', lastOrderNo: '', lastWaHref: '',\n      products: (cached && cached.products) || [],\n      categories: (cached && cached.categories) || [],\n      tags: (cached && cached.tags) || [],\n      movements: [], orders: [],\n      profile: (cached && cached.profile) || { name: 'Happy TCG', tagline: '', about: '', address: '', phone: '', whatsapp: '', hours: '', rateLAK: 605, rateUSD: 36 },\n      cart\n    };\n    this._toastTimer = null;\n    this._profTimer = null;\n  }\n\n  componentDidMount() {\n    try { document.documentElement.lang = 'en'; } catch (e) {}\n    const boot = () => {\n      if (!window.supabase) { setTimeout(boot, 100); return; }\n      this.sb = window.supabase.createClient(this.SB_URL, this.SB_KEY);\n      this.loadCatalog();\n      this.sb.auth.getSession().then(({ data }) => {\n        if (data && data.session) { this.setState({ ownerAuthed: true }); this.loadOwnerData(); }\n      });\n    };\n    boot();\n  }\n\n  pubUrl(bucket, path) {\n    return path ? this.SB_URL + '/storage/v1/object/public/' + bucket + '/' + path : null;\n  }\n\n  async loadCatalog() {\n    try {\n      const [cats, tags, prods, prof] = await Promise.all([\n        this.sb.from('categories').select('*').order('created_at'),\n        this.sb.from('tags').select('*').order('created_at'),\n        this.sb.from('products').select('*, product_images(storage_path,sort_order), product_tags(tags(name))').order('created_at'),\n        this.sb.from('store_profile').select('*').eq('id', 1).single()\n      ]);\n      const err = cats.error || tags.error || prods.error || prof.error;\n      if (err) throw err;\n      const imgsByP = {};\n      const tagsByP = {};\n      (prods.data || []).forEach(r => {\n        imgsByP[r.id] = (r.product_images || []).slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)).map(x => ({ path: x.storage_path, url: this.pubUrl('product-photos', x.storage_path) }));\n        tagsByP[r.id] = (r.product_tags || []).map(x => x.tags && x.tags.name).filter(Boolean);\n      });\n      const products = (prods.data || []).map(r => ({\n        id: r.id, name: r.name, desc: r.description || '', category: r.category_id,\n        price: Number(r.price_thb) || 0,\n        priceLAK: r.price_lak != null ? Number(r.price_lak) : 0,\n        priceUSD: r.price_usd != null ? Number(r.price_usd) : 0,\n        cost: Number(r.cost_thb) || 0, uom: r.uom, stock: r.stock,\n        color: r.tile_color || '#FF5C39',\n        images: (imgsByP[r.id] || []).map(x => x.url),\n        imageObjs: imgsByP[r.id] || [],\n        tags: tagsByP[r.id] || []\n      }));\n      const p = prof.data || {};\n      const profile = {\n          name: p.name || 'Happy TCG', tagline: p.tagline || '', about: p.about || '',\n          address: p.address || '', phone: p.phone || '', whatsapp: p.whatsapp || '', hours: p.hours || '',\n          logo: this.pubUrl('branding', p.logo_path),\n          banner: this.pubUrl('branding', p.banner_path),\n          background: this.pubUrl('branding', p.background_path),\n          rateLAK: Number(p.currency_rate_lak) || 605,\n          rateUSD: Number(p.currency_rate_usd) || 36\n      };\n      this.setState({ loading: false, categories: cats.data || [], tags: tags.data || [], products, profile });\n      try { localStorage.setItem('happy-tcg-catalog-v1', JSON.stringify({ products, categories: cats.data || [], tags: tags.data || [], profile })); } catch (e) {}\n    } catch (e) {\n      this.setState({ loading: false });\n      this.toast('Could not load the store: ' + (e.message || e));\n    }\n  }\n\n  async loadOwnerData() {\n    try {\n      const [movs, ords] = await Promise.all([\n        this.sb.from('stock_movements').select('*').order('created_at', { ascending: false }).limit(300),\n        this.sb.from('orders').select('*, order_items(*)').order('created_at', { ascending: false })\n      ]);\n      if (movs.error || ords.error) throw (movs.error || ords.error);\n      const movements = (movs.data || []).map(r => ({\n        id: r.id, date: Date.parse(r.created_at), productId: r.product_id, type: r.type, qty: r.qty, note: r.note || ''\n      }));\n      const orders = (ords.data || []).map(r => ({\n        uuid: r.id, id: r.order_no, date: Date.parse(r.created_at),\n        total: Number(r.total_thb) || 0,\n        units: (r.order_items || []).reduce((a, it) => a + it.qty, 0),\n        customer: r.customer_name, phone: r.customer_phone || '',\n        address: r.delivery_address || '', shipping: r.shipping_details || '',\n        status: r.status,\n        items: (r.order_items || []).map(it => ({ name: it.product_name, qty: it.qty, uom: it.uom }))\n      }));\n      this.setState({ movements, orders });\n    } catch (e) {\n      this.toast('Could not load orders/stock: ' + (e.message || e));\n    }\n  }\n\n  blankForm() {\n    return { id: null, name: '', category: '', price: '', priceLAK: '', priceUSD: '', cost: '', uom: 'pcs', stock: '', color: '#FF5C39', desc: '', images: [], tags: [] };\n  }\n\n  dataUrlToBlob(dataUrl) {\n    const [head, b64] = dataUrl.split(',');\n    const mime = head.match(/data:(.*?);/)[1];\n    const bin = atob(b64);\n    const arr = new Uint8Array(bin.length);\n    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);\n    return new Blob([arr], { type: mime });\n  }\n\n  resizeFile(file, max, usePng) {\n    return new Promise((resolve) => {\n      const reader = new FileReader();\n      reader.onload = () => {\n        const img = new Image();\n        img.onload = () => {\n          const scale = Math.min(1, max / Math.max(img.width, img.height));\n          const canvas = document.createElement('canvas');\n          canvas.width = Math.round(img.width * scale);\n          canvas.height = Math.round(img.height * scale);\n          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);\n          resolve(usePng ? canvas.toDataURL('image/png') : canvas.toDataURL('image/jpeg', 0.82));\n        };\n        img.src = reader.result;\n      };\n      reader.readAsDataURL(file);\n    });\n  }\n\n  onPhotoPick(e) {\n    const files = Array.from(e.target.files || []);\n    e.target.value = '';\n    files.forEach(async (file) => {\n      const dataUrl = await this.resizeFile(file, 640);\n      this.setState(st => ({ form: { ...st.form, images: st.form.images.concat([{ src: dataUrl, path: null }]) } }));\n    });\n    if (files.length) this.toast(files.length + ' photo(s) added — remember to save');\n  }\n\n  async pickProfileImage(e, field, col, max, label, usePng) {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    e.target.value = '';\n    try {\n      const dataUrl = await this.resizeFile(file, max, usePng);\n      const blob = this.dataUrlToBlob(dataUrl);\n      const path = field + '_' + Date.now() + (usePng ? '.png' : '.jpg');\n      const up = await this.sb.storage.from('branding').upload(path, blob, { contentType: blob.type });\n      if (up.error) throw up.error;\n      const upd = await this.sb.from('store_profile').update({ [col]: path }).eq('id', 1);\n      if (upd.error) throw upd.error;\n      this.setState({ profile: { ...this.state.profile, [field]: this.pubUrl('branding', path) } });\n      this.toast(label + ' updated!');\n    } catch (err) {\n      this.toast('Upload failed: ' + (err.message || err));\n    }\n  }\n\n  async removeProfileImage(field, col, label) {\n    try {\n      const upd = await this.sb.from('store_profile').update({ [col]: null }).eq('id', 1);\n      if (upd.error) throw upd.error;\n      const p = { ...this.state.profile };\n      delete p[field];\n      this.setState({ profile: p });\n      this.toast(label + ' removed');\n    } catch (err) {\n      this.toast('Failed: ' + (err.message || err));\n    }\n  }\n\n  persistCart() {\n    try { localStorage.setItem('happy-tcg-cart-v2', JSON.stringify(this.state.cart)); } catch (e) {}\n  }\n\n  toast(msg) {\n    clearTimeout(this._toastTimer);\n    this.setState({ toast: msg });\n    this._toastTimer = setTimeout(() => this.setState({ toast: '' }), 2800);\n  }\n\n  rateLAK() { return this.state.profile.rateLAK || 605; }\n  rateUSD() { return this.state.profile.rateUSD || 36; }\n\n  fmt(thb) {\n    const c = this.state.cur;\n    if (c === 'USD') return '$' + (thb / this.rateUSD()).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n    if (c === 'LAK') return '₭' + Math.round(thb * this.rateLAK()).toLocaleString('en-US');\n    return '฿' + Math.round(thb).toLocaleString('en-US');\n  }\n\n  priceFor(p) {\n    const c = this.state.cur;\n    if (c === 'USD') return p.priceUSD > 0 ? p.priceUSD : Math.round(p.price / this.rateUSD() * 100) / 100;\n    if (c === 'LAK') return p.priceLAK > 0 ? p.priceLAK : Math.round(p.price * this.rateLAK());\n    return p.price;\n  }\n\n  fmtCur(v) {\n    const c = this.state.cur;\n    if (c === 'USD') return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n    if (c === 'LAK') return '₭' + Math.round(v).toLocaleString('en-US');\n    return '฿' + v.toLocaleString('en-US');\n  }\n\n  glyph(name) {\n    const parts = name.split(' ').filter(w => /[A-Za-z0-9]/.test(w[0]));\n    return (parts[0] ? parts[0][0] : '?') + (parts[1] ? parts[1][0] : '');\n  }\n\n  tileBg(color) {\n    return 'repeating-linear-gradient(45deg,' + color + '1f 0 12px,' + color + '3d 12px 24px)';\n  }\n\n  photoEl(image, label) {\n    if (!image) return null;\n    return React.createElement('div', {\n      role: label ? 'img' : undefined,\n      'aria-label': label || undefined,\n      'aria-hidden': label ? undefined : 'true',\n      style: { position: 'absolute', inset: 0, backgroundImage: 'url(\"' + image + '\")', backgroundSize: 'cover', backgroundPosition: 'center' }\n    });\n  }\n\n  catName(id) {\n    const c = this.state.categories.find(c => c.id === id);\n    return c ? c.name : '—';\n  }\n\n  cartQty(pid) {\n    const ci = this.state.cart.find(c => c.productId === pid);\n    return ci ? ci.qty : 0;\n  }\n\n  addToCart(p, qty) {\n    qty = qty || 1;\n    const inCart = this.cartQty(p.id);\n    if (p.stock <= 0) { this.toast('Sold out — check back soon!'); return; }\n    if (inCart + qty > p.stock) { this.toast('Only ' + p.stock + ' ' + p.uom + ' in stock (' + inCart + ' already in cart)'); return; }\n    const cart = this.state.cart.slice();\n    const ci = cart.find(c => c.productId === p.id);\n    if (ci) cart[cart.indexOf(ci)] = { ...ci, qty: ci.qty + qty };\n    else cart.push({ productId: p.id, qty });\n    this.setState({ cart }, () => this.persistCart());\n    this.toast('Added ' + qty + ' × \"' + p.name + '\" to cart');\n  }\n\n  productVM(p) {\n    const threshold = this.props.lowStockThreshold ?? 3;\n    const inStock = p.stock > 0;\n    const low = inStock && p.stock <= threshold;\n    const images = p.images || [];\n    return {\n      id: p.id, name: p.name, uom: p.uom, stock: p.stock, color: p.color,\n      hasImg: images.length > 0, noImg: images.length === 0,\n      multiImg: images.length > 1, imgCount: images.length,\n      photoEl: this.photoEl(images[0], images.length ? p.name : null),\n      tagChips: (p.tags || []).map(t => ({ name: t })),\n      desc: p.desc || '', glyph: this.glyph(p.name), tileBg: this.tileBg(p.color),\n      catName: this.catName(p.category),\n      priceStr: this.fmtCur(this.priceFor(p)),\n      stockLabel: !inStock ? 'Sold out' : (low ? 'Only ' + p.stock + ' left!' : 'In stock'),\n      stockColor: !inStock ? '#D63E1E' : (low ? '#E08700' : '#4CB944'),\n      inStock,\n      btnLabel: inStock ? '+ Add' : 'Sold out',\n      btnLabelBig: inStock ? 'Add to cart' : 'Sold out',\n      btnBg: inStock ? '#FF5C39' : '#E7DCC8',\n      btnFg: inStock ? '#fff' : '#6B5E85',\n      open: () => this.setState({ screen: 'product', selId: p.id, galleryIdx: 0, detailQty: 1 }),\n      openKey: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.setState({ screen: 'product', selId: p.id, galleryIdx: 0, detailQty: 1 }); } },\n      addToCart: () => this.addToCart(p, 1)\n    };\n  }\n\n  moveVM(m) {\n    const p = this.state.products.find(x => x.id === m.productId);\n    const isIn = m.type === 'in';\n    const labels = { 'in': 'Stock in', 'out': 'Stock out', 'sale': 'Sale', 'adjust': 'Adjustment' };\n    return {\n      qtyStr: (isIn ? '+' : '−') + m.qty,\n      badgeBg: isIn ? '#DFF5E1' : '#FFE3D6',\n      badgeFg: isIn ? '#2E7D32' : '#D63E1E',\n      name: p ? p.name : '(deleted product)',\n      typeLabel: labels[m.type] || m.type,\n      when: new Date(m.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),\n      note: m.note || '—'\n    };\n  }\n\n  orderVM(o, forOwner) {\n    const statusMeta = {\n      'new': { label: 'New', bg: '#FFC93C', fg: '#2B2140' },\n      'preparing': { label: 'Preparing', bg: '#7B61FF', fg: '#fff' },\n      'ready': { label: 'Ready for pickup', bg: '#00A896', fg: '#fff' },\n      'completed': { label: 'Completed', bg: '#4CB944', fg: '#fff' }\n    };\n    const meta = statusMeta[o.status] || statusMeta['new'];\n    const vm = {\n      id: o.id,\n      when: new Date(o.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }),\n      customer: o.customer,\n      phone: o.phone || '—',\n      units: o.units,\n      totalStr: this.fmt(o.total),\n      itemsStr: (o.items || []).map(it => it.qty + '× ' + it.name).join(', ') || '—',\n      shippingStr: [o.address, o.shipping].filter(Boolean).join(' · ') || 'No address / shipping details',\n      status: o.status,\n      statusLabel: meta.label, statusBg: meta.bg, statusFg: meta.fg\n    };\n    if (forOwner) {\n      vm.onStatus = async (e) => {\n        const status = e.target.value;\n        const upd = await this.sb.from('orders').update({ status }).eq('id', o.uuid);\n        if (upd.error) { this.toast('Failed: ' + upd.error.message); return; }\n        this.setState({ orders: this.state.orders.map(x => x.uuid === o.uuid ? { ...x, status } : x) });\n        this.toast(o.id + ' → ' + (statusMeta[status] || statusMeta['new']).label);\n      };\n    }\n    return vm;\n  }\n\n  async submitStock() {\n    const f = this.state.stockForm;\n    const pid = f.productId || (this.state.products[0] && this.state.products[0].id);\n    const p = this.state.products.find(x => x.id === pid);\n    const qty = Math.floor(Number(f.qty));\n    if (!p) { this.toast('Pick a product first'); return; }\n    if (!qty || qty <= 0) { this.toast('Enter a quantity greater than 0'); return; }\n    if (f.type === 'out' && qty > p.stock) { this.toast('Not enough stock — only ' + p.stock + ' ' + p.uom); return; }\n    const newStock = f.type === 'in' ? p.stock + qty : p.stock - qty;\n    try {\n      const ins = await this.sb.from('stock_movements').insert({ product_id: p.id, type: f.type, qty, note: f.note || 'Manual ' + f.type });\n      if (ins.error) throw ins.error;\n      const upd = await this.sb.from('products').update({ stock: newStock, updated_at: new Date().toISOString() }).eq('id', p.id);\n      if (upd.error) throw upd.error;\n      this.setState({\n        products: this.state.products.map(x => x.id === p.id ? { ...x, stock: newStock } : x),\n        movements: [{ id: 'tmp' + Date.now(), date: Date.now(), productId: p.id, type: f.type, qty, note: f.note || 'Manual ' + f.type }].concat(this.state.movements),\n        stockForm: { ...f, qty: '', note: '' }\n      });\n      this.toast('Saved: ' + (f.type === 'in' ? '+' : '−') + qty + ' ' + p.uom + ' of ' + p.name);\n    } catch (e) {\n      this.toast('Failed to save: ' + (e.message || e));\n    }\n  }\n\n  async saveProduct() {\n    const f = this.state.form;\n    if (this.state.saving) return;\n    if (!f.name.trim()) { this.toast('Give the product a name'); return; }\n    if (!f.category) { this.toast('Pick a category'); return; }\n    this.setState({ saving: true });\n    try {\n      const price = Number(f.price) || 0;\n      const priceLAK = Number(f.priceLAK) || 0;\n      const priceUSD = Number(f.priceUSD) || 0;\n      const cost = Number(f.cost) || 0;\n      const stock = Math.max(0, Math.floor(Number(f.stock) || 0));\n      const row = {\n        name: f.name. 96', '#7B61FF', '#FF7BAC', '#4CB944'].map(c => ({\n      c,\n      border: s.form.color === c ? '3px solid #2B2140' : '3px solid #E7DCC8',\n      pick: () => this.setState({ form: { ...s.form, color: c } })\n    }));\n\n    const catRows = s.categories.map(c => {\n      const count = s.products.filter(p => p.category === c.id).length;\n      return {\n        name: c.name, count,\n        del: async () => {\n          if (count > 0) { this.toast('Move its ' + count + ' product(s) to another category first'); return; }\n          const del = await this.sb.from('categories').delete().eq('id', c.id);\n          if (del.error) { this.toast('Failed: ' + del.error.message); return; }\n          this.setState({ categories: s.categories.filter(x => x.id !== c.id) });\n          this.toast('Deleted category \"' + c.name + '\"');\n        }\n      };\n    });\n\n    const tagRows = s.tags.map(t => {\n      const count = s.products.filter(p => (p.tags || []).includes(t.name)).length;\n      return {\n        name: t.name, count,\n        del: async () => {\n          const del = await this.sb.from('tags').delete().eq('id', t.id);\n          if (del.error) { this.toast('Failed: ' + del.error.message); return; }\n          this.setState({\n            tags: s.tags.filter(x => x.id !== t.id),\n            products: s.products.map(p => ({ ...p, tags: (p.tags || []).filter(x => x !== t.name) })),\n            shopTags: s.shopTags.filter(x => x !== t.name)\n          });\n          this.toast('Deleted tag \"' + t.name + '\"');\n        }\n      };\n    });\n\n    const formTagChips = s.tags.map(t => {\n      const on = s.form.tags.includes(t.name);\n      return {\n        name: t.name,\n        bg: on ? '#7B61FF' : '#fff',\n        fg: on ? '#fff' : '#2B2140',\n        toggle: () => this.setState({\n          form: { ...s.form, tags: on ? s.form.tags.filter(x => x !== t.name) : s.form.tags.concat([t.name]) }\n        })\n      };\n    });\n\n    const formPhotoRows = s.form.images. \n      shopBrowse: isShop && s.screen === 'browse',\n      shopProduct: isShop && s.screen === 'product',\n      shopCart: isShop && s.screen === 'cart',\n      shopCheckout: isShop && s.screen === 'checkout',\n      shopDone: isShop && s.screen === 'done',\n      shopProfile: isShop && s.screen === 'profile',\n      catChips, shopProducts, sel, selThumbs, shopTagChips,\n      resultLabel: shopProducts.length + (shopProducts.length === 1 ? ' item' : ' items') + (q ? ' matching \"' + s.searchQ.trim() + '\"' : ''),\n\n      detailQty: s.detailQty,\n      incDetailQty: () => this.setState({ detailQty: Math.min(maxAdd || 1, s.detailQty + 1) }),\n      decDetailQty: () => this.setState({ detailQty: Math.max(1, s.detailQty - 1) }),\n      addDetailToCart: () => { if (selP) this.addToCart(selP, Math.min(s.detailQty, Math.max(1, maxAdd))); },\n      detailMaxNote: selP ? (maxAdd > 0 ? 'You can add up to ' + maxAdd + ' ' + selP.uom + ' (stock minus what is already in your cart).' : 'No more stock available — check your cart.') : '',\n\n      cartItems, cartCount,\n      cartEmpty: cartItems.length === 0,\n      hasCart: cartItems.length > 0,\n      cartTotalStr: this.fmtCur(cartTotal),\n      checkout: s.checkout,\n      onCheckoutChange: (e) => this.setState({ checkout: { ...s.checkout, [e.target.name]: e.target.value } }),\n      placeOrder: () => this.placeOrder(),\n      placeOrderLabel: s.placing ? 'Placing order…' : 'Place order',\n      lastOrderNo: s.lastOrderNo,\n      waHref: s.lastWaHref,\n      hasWa: !!s.lastWaHref,\n\n      orderRows, ownerOrderRows, orderFilterChips,\n      orderCount: ownerOrderRows.length,\n      noOrders: s.orders.length === 0,\n\n      ownerTabs,\n      tabDash: ownerUnlocked && s.tab === 'dash',\n      tabOrders: ownerUnlocked && s.tab === 'orders',\n      tabProducts: ownerUnlocked && s.tab === 'products',\n      tabStock: ownerUnlocked && s.tab === 'stock',\n      tabCats: ownerUnlocked && s.tab === 'cats',\n      tabProfile: ownerUnlocked && s.tab === 'profile',\n      statCards,\n      lowStockList, lowStockCount: lowStockList.length, noLowStock: lowStockList.length === 0,\n      recentMoves: allMoves.slice(0, 6),\n      allMoves,\n      productCount: ownerProducts.length,\n      ownerProducts,\n      ownerCatFilter: s.ownerCatFilter,\n      ownerUomFilter: s.ownerUomFilter,\n      onOwnerCatFilter: (e) => this.setState({ ownerCatFilter: e.target.value }),\n      onOwnerUomFilter: (e) => this.setState({ ownerUomFilter: e.target.value }),\n      uomOptions: Array.from(new Set(s.products.map(p => p.uom))).sort().map(u => ({ id: u, name: u })),\n\n      stockForm: { ...s.stockForm, productId: stockPid },\n      productOptions: s.products.map(p => ({ id: p.id, label: p.name + ' (' + p.stock + ' ' + p.uom + ')' })),\n      onStockChange: (e) => this.setState({ stockForm: { ...s.stockForm, productId: stockPid, [e.target.name]: e.target.value } }),\n      setStockIn: () => this.setState({ stockForm: { ...s.stockForm, productId: stockPid, type: 'in' } }),\n      setStockOut: () => this.setState({ stockForm: { ...s.stockForm, productId: stockPid, type: 'out' } }),\n      inBtnBg: s.stockForm.type === 'in' ? '#00A896' : '#fff', inBtnFg: s.stockForm.type === 'in' ? '#fff' : '#2B2140',\n      outBtnBg: s.stockForm.type === 'out' ? '#D63E1E' : '#fff', outBtnFg: s.stockForm.type === 'out' ? '#fff' : '#2B2140',\n      submitStock: () => this.submitStock(),\n\n      newCat: s.newCat,\n      onNewCat: (e) => this.setState({ newCat: e.target.value }),\n      addCategory: async () => {\n        const name = s.newCat.trim();\n        if (!name) { this.toast('Type a category name first'); return; }\n        if (s.categories.some(c => c.name.toLowerCase() === name.toLowerCase())) { this.toast('That category already exists'); return; }\n        const ins = await this.sb.from('categories').insert({ name }).select().single();\n        if (ins.error) { this.toast('Failed: ' + ins.error.message); return; }\n        this.setState({ categories: s.categories.concat([ins.data]), newCat: '' });\n        this.toast('Added category \"' + name + '\"');\n      },\n      catRows,\n      categories: s.categories,\n      newTag: s.newTag,\n      onNewTag: (e) => this.setState({ newTag: e.target.value }),\n      addTag: async () => {\n        const name = s.newTag.trim();\n        if (!name) { this.toast('Type a tag name first'); return; }\n        if (s.tags.some(t => t.name.toLowerCase() === name.toLowerCase())) { this.toast('That tag already exists'); return; }\n        const ins = await this.sb.from('tags').insert({ name }).select().single();\n        if (ins.error) { this.toast('Failed: ' + ins.error.message); return; }\n        this.setState({ tags: s.tags.concat([ins.data]), newTag: '' });\n        this.toast('Added tag \"' + name + '\"');\n      },\n      tagRows,\n\n      profile: s.profile,\n      onProfileChange: (e) => {\n        const field = e.target.name, value = e.target.value;\n        this.setState({ profile: { ...s.profile, [field]: value } });\n        this.pushProfile({ [field]: value });\n      },\n\n      hasBanner: !!s.profile.banner,\n      noBanner: !s.profile.banner,\n      bannerEl: this.photoEl(s.profile.banner),\n      onBannerPick: (e) => this.pickProfileImage(e, 'banner', 'banner_path', 1600, 'Banner'),\n      removeBanner: () => this.removeProfileImage('banner', 'banner_path', 'Banner'),\n      hasLogo: !!s.profile.logo,\n      noLogo: !s.profile.logo,\n      logoEl: this.photoEl(s.profile.logo, 'Store logo'),\n      onLogoPick: (e) => this.pickProfileImage(e, 'logo', 'logo_path', 256, 'Logo', true),\n      removeLogo: () => this.removeProfileImage('logo', 'logo_path', 'Logo'),\n      hasBg: !!s.profile.background,\n      noBg: !s.profile.background,\n      bgEl: s.profile.background ? React.createElement('div', {\n        'aria-hidden': 'true',\n        style: { position: 'fixed', inset: 0, zIndex: -1, backgroundImage: 'url(\"' + s.profile.background + '\")', backgroundSize: 'cover', backgroundPosition: 'center' }\n      }) : null,\n      bgPreviewEl: this.photoEl(s.profile.background),\n      onBgPick: (e) => this.pickProfileImage(e, 'background', 'background_path', 1920, 'Page background'),\n      removeBg: () => this.removeProfileImage('background', 'background_path', 'Page background'),\n\n      modalOpen: s.modalOpen,\n      modalTitle: s.form.id ? 'Edit product' : 'Add product',\n      formIsEdit: !!s.form.id,\n      form: s.form,\n      colorOptions,\n      formTagChips,\n      formPhotoRows,\n      formPhotoCount: s.form.images.length,\n      onFormChange: (e) => this.setState({ form: { ...s.form, [e.target.name]: e.target.value } }),\n      onPhotoPick: (e) => this.onPhotoPick(e),\n      autoLAK: s.form.price ? 'auto: ' + Math.round(Number(s.form.price) * this.rateLAK()).toLocaleString('en-US') : 'auto from THB',\n      autoUSD: s.form.price ? 'auto: ' + (Number(s.form.price) / this.rateUSD()).toFixed(2) : 'auto from THB',\n      openAddProduct: () => this.setState({ modalOpen: true, form: { ...this.blankForm(), category: s.categories[0] ? s.categories[0].id : '' } }),\n      closeModal: () => this.setState({ modalOpen: false }),\n      saveProduct: () => this.saveProduct(),\n      saveProductLabel: s.saving ? 'Saving…' : 'Save product',\n      deleteProduct: () => this.deleteProduct(),\n\n      toast: s.toast,\n      hasToast: !!s.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
